backendStore:
  sqlite:
    enabled: true
    path: /mlflow/mlruns/mlflow.db

artifactRoot:
  s3:
    enabled: true
    bucket: mlflow-artifacts
    path: ""
    # awsAccessKeyId i awsSecretAccessKey se injektuju iz Terraform set_sensitive
    s3EndpointUrl: "http://minio.minio.svc.cluster.local:9000"
    ignoreeTLS: "true"

# extraEnvVars mora biti mapa (dict), ne lista — community-charts/mlflow specifičnost
extraEnvVars:
  MLFLOW_S3_IGNORE_TLS: "true"

service:
  type: NodePort
  port: 5000
  nodePort: 30500

persistence:
  enabled: true
  storageClassName: local-path
  size: 10Gi

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 1Gi
