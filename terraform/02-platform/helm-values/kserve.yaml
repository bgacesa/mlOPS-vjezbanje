kserve:
  controller:
    # RawDeployment ne zahtijeva Knative
    deploymentMode: RawDeployment
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi

  modelmesh:
    enabled: false

  # Konfiguracija inference servica
  inferenceservice:
    logger:
      defaultUrl: "http://broker-ingress.knative-eventing.svc.cluster.local"
    batcher:
      maxBatchSize: "32"
      maxLatency: "5000"
    ingress:
      domainTemplate: "{{ .Name }}-{{ .Namespace }}.example.com"
