name: "02 · ML Platforma (Helm via Terraform)"

on:
  push:
    branches: [main]
    paths:
      - "terraform/02-platform/**"
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform akcija"
        required: true
        default: "plan"
        type: choice
        options: [plan, apply, destroy]
  workflow_run:
    workflows: ["01 · Infrastruktura (Terraform)"]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  id-token: write

env:
  TF_DIR: terraform/02-platform
  TF_VERSION: "1.8.0"
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-central-1' }}

jobs:
  terraform:
    name: "Platform ${{ inputs.action || 'plan' }}"
    runs-on: ubuntu-latest
    # Pokreni samo ako je prethodni workflow uspješan ili je manual dispatch
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      github.event.workflow_run.conclusion == 'success'

    defaults:
      run:
        working-directory: ${{ env.TF_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Instaliraj kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "v1.29.0"

      - name: Preuzmi kubeconfig sa EC2 via SSM
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Role,Values=k8s-master" \
                      "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text)

          echo "Instance ID: $INSTANCE_ID"

          # Preuzmi kubeconfig via SSM (bez potrebe za SSH key-om)
          aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=["sudo cat /etc/kubernetes/admin.conf"]' \
            --output json > /tmp/ssm-result.json

          COMMAND_ID=$(cat /tmp/ssm-result.json | jq -r '.Command.CommandId')
          sleep 5

          PUBLIC_IP=${{ vars.K8S_MASTER_IP }}
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "StandardOutputContent" \
            --output text \
          | sed "s|server: https://.*:6443|server: https://$PUBLIC_IP:6443|" \
          > /tmp/kubeconfig

          chmod 600 /tmp/kubeconfig
          echo "KUBECONFIG=/tmp/kubeconfig" >> $GITHUB_ENV

      - name: Provjeri cluster konekciju
        run: kubectl get nodes
        env:
          KUBECONFIG: /tmp/kubeconfig

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan -no-color -out=tfplan \
            -var="kubeconfig_path=/tmp/kubeconfig"
        env:
          TF_VAR_minio_root_password: ${{ secrets.MINIO_ROOT_PASSWORD }}
          TF_VAR_grafana_admin_password: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}

      - name: Terraform Apply
        if: inputs.action == 'apply' || github.event_name == 'workflow_run'
        run: terraform apply -auto-approve tfplan
        env:
          TF_VAR_minio_root_password: ${{ secrets.MINIO_ROOT_PASSWORD }}
          TF_VAR_grafana_admin_password: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}

      - name: Terraform Destroy
        if: inputs.action == 'destroy'
        run: |
          terraform destroy -auto-approve \
            -var="kubeconfig_path=/tmp/kubeconfig"
        env:
          TF_VAR_minio_root_password: ${{ secrets.MINIO_ROOT_PASSWORD }}
          TF_VAR_grafana_admin_password: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
