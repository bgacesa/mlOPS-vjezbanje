name: "04 · Build & Push Docker Image"
# Builda ML model serving Docker image i pushuje na GHCR i AWS ECR.

on:
  push:
    branches: [main]
    tags:
      - "v*.*.*"
    paths:
      - "src/**"
      - "Dockerfile"
      - ".dockerignore"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "Dockerfile"
  workflow_dispatch:
    inputs:
      push_to_ecr:
        description: "Puši i na ECR (ne samo GHCR)"
        type: boolean
        default: false

permissions:
  contents: read
  packages: write   # Za push na GHCR
  id-token: write   # OIDC za ECR

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-central-1' }}
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-push:
    name: "Build & Push"
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      ghcr_image: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker meta (tagovi i labele)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
          labels: |
            org.opencontainers.image.title=MLOps Model Server
            org.opencontainers.image.description=ML model serving image

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login na GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS Credentials (za ECR)
        if: startsWith(github.ref, 'refs/tags/') || inputs.push_to_ecr
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login na ECR
        id: ecr-login
        if: startsWith(github.ref, 'refs/tags/') || inputs.push_to_ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build i Push na GHCR
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_SHA=${{ github.sha }}

      - name: Push na ECR
        if: (startsWith(github.ref, 'refs/tags/') || inputs.push_to_ecr) && github.event_name != 'pull_request'
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_REPO: ${{ vars.ECR_REPOSITORY_NAME || 'mlops-vjezba/dev' }}
          IMAGE_TAG: ${{ steps.meta.outputs.version }}
        run: |
          docker pull ghcr.io/${{ env.IMAGE_NAME }}:$IMAGE_TAG
          docker tag ghcr.io/${{ env.IMAGE_NAME }}:$IMAGE_TAG \
            $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG
          docker tag ghcr.io/${{ env.IMAGE_NAME }}:$IMAGE_TAG \
            $ECR_REGISTRY/$ECR_REPO:latest
          docker push $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPO:latest

          echo "### Docker Image" >> $GITHUB_STEP_SUMMARY
          echo "- **GHCR**: \`ghcr.io/${{ env.IMAGE_NAME }}:$IMAGE_TAG\`" >> $GITHUB_STEP_SUMMARY
          echo "- **ECR**: \`$ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG\`" >> $GITHUB_STEP_SUMMARY

  security-scan:
    name: "Trivy Security Scan"
    runs-on: ubuntu-latest
    needs: build-push
    if: github.event_name != 'pull_request'

    steps:
      - name: Login na GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "ghcr.io/${{ env.IMAGE_NAME }}:${{ needs.build-push.outputs.image_tag }}"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"

      - name: Upload Trivy results na GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-results.sarif"
