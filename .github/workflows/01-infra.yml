name: "01 · Infrastruktura (Terraform)"

on:
  push:
    branches: [main]
    paths:
      - "terraform/01-infra/**"
  pull_request:
    branches: [main]
    paths:
      - "terraform/01-infra/**"
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform akcija"
        required: true
        default: "plan"
        type: choice
        options: [plan, apply, destroy]

permissions:
  contents: read
  id-token: write      # OIDC za AWS autentifikaciju
  pull-requests: write # Za postavljanje plan outputa kao PR komentar

env:
  TF_DIR: terraform/01-infra
  TF_VERSION: "1.8.0"
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-central-1' }}

jobs:
  terraform:
    name: "Terraform ${{ inputs.action || (github.event_name == 'pull_request' && 'plan') || 'plan' }}"
    runs-on: ubuntu-latest
    environment: ${{ inputs.action == 'apply' && 'production' || 'development' }}

    defaults:
      run:
        working-directory: ${{ env.TF_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        if: github.event_name == 'pull_request' || inputs.action == 'plan' || inputs.action == 'apply'
        run: |
          terraform plan -no-color -out=tfplan \
            -var="key_name=${{ secrets.EC2_KEY_NAME }}"
        env:
          TF_VAR_environment: ${{ vars.ENVIRONMENT || 'dev' }}

      - name: Post Plan na PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const output = `#### Terraform Format: \`${{ steps.fmt.outcome }}\`
            #### Terraform Init: \`${{ steps.init.outcome }}\`
            #### Terraform Validate: \`${{ steps.validate.outcome }}\`
            #### Terraform Plan: \`${{ steps.plan.outcome }}\`

            <details><summary>Plan Output</summary>

            \`\`\`terraform
            ${{ steps.plan.outputs.stdout }}
            \`\`\`

            </details>

            *Pusher: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

      - name: Terraform Apply
        if: inputs.action == 'apply'
        run: |
          terraform apply -auto-approve tfplan
        env:
          TF_VAR_environment: ${{ vars.ENVIRONMENT || 'dev' }}

      - name: Spremi Public IP u GitHub Variable
        if: inputs.action == 'apply'
        run: |
          PUBLIC_IP=$(terraform output -raw instance_public_ip)
          gh variable set K8S_MASTER_IP --body "$PUBLIC_IP"
          echo "Master IP: $PUBLIC_IP"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Terraform Destroy
        if: inputs.action == 'destroy'
        run: |
          terraform destroy -auto-approve \
            -var="key_name=${{ secrets.EC2_KEY_NAME }}"
        env:
          TF_VAR_environment: ${{ vars.ENVIRONMENT || 'dev' }}
